<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o amor da minha vida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen">

    <!-- Capa -->
    <div class="w-64 h-64 rounded-2xl shadow-[0_0_50px_rgba(168,28,50,0.5)] mb-8 overflow-hidden border-2 border-white/10">
        <img src="file:///C:/Users/PC_DE/Downloads/motion_photo_607875357497213772.jpg" alt="Foto do Casal" class="w-full h-full object-cover">
    </div>

    <!-- Contador -->
    <div class="bg-white/5 p-6 rounded-3xl w-full max-w-sm mb-8 border border-white/10 text-center">
        <h2 class="text-red-500 font-bold mb-4 uppercase tracking-widest text-sm">Juntos desde 12/06/2025</h2>
        <div id="counter" class="grid grid-cols-3 gap-2"></div>
    </div>

    <!-- Player de Música (YouTube Embed) -->
    <div class="w-full max-w-sm bg-zinc-900 p-4 rounded-3xl border border-white/10 mb-8">
        <h3 class="font-bold text-center mb-4">Luan Santana - Te Vivo</h3>
       <audio controls>
        <source src="musica fd.mp3" 
        type="audio/mpeg">
         Your browser does not support the audio element.
       </audio>
    </div>

    <!-- Mensagem Romântica -->
    <div class="max-w-sm text-center p-6 bg-white/5 rounded-3xl border border-white/10 italic">
        "Amar você é acordar todos os dias com vontade de ser melhor, é encontrar beleza nas rotinas e descobrir que o meu lugar preferido no mundo é ao seu lado.Eu te amo hoje e sempre, Te vivo minha burguesinha"
    </div>

    <script>
        function updateTimer() {
            const start = new Date("2025-06-12T00:00:00");
            const now = new Date();
            const diff = now - start;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24)) % 30;
            const months = Math.floor(diff / (1000 * 60 * 60 * 24 * 30)) % 12;
            const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 30 * 12));
            
            document.getElementById('counter').innerHTML = `
                <div><div class="text-2xl font-bold">${years}</div><div class="text-[10px] text-gray-400">Anos</div></div>
                <div><div class="text-2xl font-bold">${months}</div><div class="text-[10px] text-gray-400">Meses</div></div>
                <div><div class="text-2xl font-bold">${days}</div><div class="text-[10px] text-gray-400">Dias</div></div>
            `;
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
